name: Build & Push DevOps Dashboard Image

on:
  push:
    branches: [master]              # runs on push to main
  pull_request:                   # optional: test build on PRs
    branches: [master]
  workflow_dispatch:              # allows manual trigger from GitHub UI

jobs:
  build-and-push:
    runs-on: ubuntu-latest        # GitHub-hosted Linux runner

    steps:
      # Step 1: Checkout your repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Docker Buildx (supports advanced builds, multi-platform, secrets)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Login to Docker Hub using secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 4: Build the image and push it to Docker Hub
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .                  # build from root of repo
          file: ./Dockerfile
          push: true                  # actually push after build
          tags: |
            ryandevlab/devops-vuln-dashboard:latest
            ryandevlab/devops-vuln-dashboard:${{ github.sha }}  # optional: tag with commit SHA
          cache-from: type=gha        # use GitHub Actions cache for faster builds
          cache-to: type=gha,mode=max