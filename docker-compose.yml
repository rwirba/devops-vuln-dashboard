version: '3.9'
services:
  dashboard:
    build: .
    ports:
      - "8080:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro   # Required for local image scans
      - trivy_cache:/root/.cache/trivy                 # Trivy DB cache (fast subsequent scans)
      - dashboard_data:/data                           # Persistent scan list + reports
    restart: unless-stopped

volumes:
  trivy_cache:
  dashboard_data: